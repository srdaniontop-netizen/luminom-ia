<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Luminom IA - Tutor Futurista</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --neon-blue:#00F0FF;
      --neon-pink:#FF006E;
      --neon-purple:#A855F7;
      --neon-green:#00FF94;
      --dark:#0A0118;
      --darker:#050011;
      --glow-blue:rgba(0,240,255,0.6);
      --glow-pink:rgba(255,0,110,0.6);
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    
    /* Futuristic Background */
    body{
      font-family:'Space Grotesk',sans-serif;
      background:var(--darker);
      color:#fff;
      height:100vh;
      overflow:hidden;
      position:relative;
    }
    body::before{
      content:'';
      position:fixed;
      inset:0;
      background:
        radial-gradient(circle at 20% 20%,rgba(168,85,247,0.15) 0%,transparent 50%),
        radial-gradient(circle at 80% 80%,rgba(0,240,255,0.15) 0%,transparent 50%),
        radial-gradient(circle at 50% 50%,rgba(255,0,110,0.08) 0%,transparent 70%);
      animation:bgPulse 8s ease-in-out infinite;
      z-index:-1;
    }
    @keyframes bgPulse{0%,100%{opacity:1;}50%{opacity:0.6;}}
    
    /* Animated Grid */
    .grid-bg{
      position:fixed;
      inset:0;
      background-image:

        linear-gradient(rgba(0,240,255,0.03) 1px,transparent 1px),
        linear-gradient(90deg,rgba(0,240,255,0.03) 1px,transparent 1px);
      background-size:50px 50px;
      animation:gridMove 20s linear infinite;
      z-index:-1;
      opacity:0.4;
    }
    @keyframes gridMove{0%{transform:translate(0,0);}100%{transform:translate(50px,50px);}}
    
    /* Particles */
    .particles{
      position:fixed;
      inset:0;
      z-index:-1;
      overflow:hidden;
    }
    .particle{
      position:absolute;
      width:4px;
      height:4px;
      background:var(--neon-blue);
      border-radius:50%;
      box-shadow:0 0 10px var(--glow-blue);
      animation:float 15s ease-in-out infinite;
    }
    @keyframes float{
      0%,100%{transform:translateY(0) translateX(0);}
      25%{transform:translateY(-30px) translateX(20px);}
      50%{transform:translateY(-60px) translateX(-20px);}
      75%{transform:translateY(-30px) translateX(10px);}
    }
    
    /* Main Container */
    .container{
      display:flex;
      flex-direction:column;
      height:100vh;
      position:relative;
      z-index:1;
    }

    
    /* Futuristic Header */
    .header{
      background:rgba(10,1,24,0.8);
      backdrop-filter:blur(20px);
      border-bottom:2px solid rgba(0,240,255,0.3);
      padding:1.2rem 3rem;
      display:flex;
      justify-content:space-between;
      align-items:center;
      box-shadow:0 8px 32px rgba(0,240,255,0.2),inset 0 -1px 0 rgba(0,240,255,0.4);
      position:relative;
    }
    .header::after{
      content:'';
      position:absolute;
      bottom:-2px;
      left:0;
      width:100%;
      height:2px;
      background:linear-gradient(90deg,transparent,var(--neon-blue) 50%,transparent);
      animation:scanline 3s linear infinite;
    }
    @keyframes scanline{0%{transform:translateX(-100%);}100%{transform:translateX(100%);}}
    
    .logo{
      font-family:'Orbitron',sans-serif;
      font-size:1.8rem;
      font-weight:900;
      background:linear-gradient(135deg,var(--neon-blue),var(--neon-pink),var(--neon-purple));
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      background-clip:text;
      text-shadow:0 0 30px var(--glow-blue);
      display:flex;
      align-items:center;
      gap:0.7rem;
      letter-spacing:2px;
    }
    .logo::before{
      content:'◆';
      font-size:2rem;
      color:var(--neon-blue);
      animation:rotate360 4s linear infinite;
      filter:drop-shadow(0 0 10px var(--glow-blue));
    }
    @keyframes rotate360{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}

    
    .header-actions{
      display:flex;
      gap:1rem;
      align-items:center;
    }
    .btn-neon{
      padding:0.7rem 1.8rem;
      background:transparent;
      border:2px solid var(--neon-blue);
      color:var(--neon-blue);
      font-weight:600;
      font-size:0.9rem;
      border-radius:8px;
      cursor:pointer;
      transition:all 0.3s;
      text-decoration:none;
      position:relative;
      overflow:hidden;
      text-transform:uppercase;
      letter-spacing:1px;
    }
    .btn-neon::before{
      content:'';
      position:absolute;
      inset:0;
      background:var(--neon-blue);
      opacity:0;
      transition:opacity 0.3s;
    }
    .btn-neon:hover::before{opacity:0.15;}
    .btn-neon:hover{
      box-shadow:0 0 20px var(--glow-blue),inset 0 0 20px var(--glow-blue);
      transform:translateY(-2px);
    }
    .btn-neon.pink{
      border-color:var(--neon-pink);
      color:var(--neon-pink);
    }
    .btn-neon.pink::before{background:var(--neon-pink);}
    .btn-neon.pink:hover{box-shadow:0 0 20px var(--glow-pink),inset 0 0 20px var(--glow-pink);}
    
    /* Chat Area */
    .chat-area{
      flex:1;
      display:flex;
      flex-direction:column;
      max-width:1400px;
      width:100%;
      margin:0 auto;
      padding:2rem;
      overflow:hidden;
    }

    
    /* Messages Container */
    .messages{
      flex:1;
      overflow-y:auto;
      padding:1rem;
      display:flex;
      flex-direction:column;
      gap:2rem;
    }
    .messages::-webkit-scrollbar{width:10px;}
    .messages::-webkit-scrollbar-track{background:rgba(0,240,255,0.05);border-radius:10px;}
    .messages::-webkit-scrollbar-thumb{
      background:linear-gradient(180deg,var(--neon-blue),var(--neon-purple));
      border-radius:10px;
      box-shadow:0 0 10px var(--glow-blue);
    }
    
    /* Message Bubbles */
    .message{
      display:flex;
      gap:1.5rem;
      align-items:flex-start;
      animation:messageSlide 0.5s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes messageSlide{from{opacity:0;transform:translateY(30px) scale(0.9);}to{opacity:1;transform:translateY(0) scale(1);}}
    
    .message.user{flex-direction:row-reverse;}
    
    .avatar{
      width:50px;
      height:50px;
      border-radius:12px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:1.5rem;
      flex-shrink:0;
      position:relative;
      font-weight:700;
    }
    .message.bot .avatar{
      background:linear-gradient(135deg,var(--neon-blue),var(--neon-purple));
      box-shadow:0 8px 32px var(--glow-blue),inset 0 0 20px rgba(255,255,255,0.2);
      border:2px solid rgba(255,255,255,0.3);
    }

    .message.user .avatar{
      background:linear-gradient(135deg,var(--neon-pink),var(--neon-purple));
      box-shadow:0 8px 32px var(--glow-pink),inset 0 0 20px rgba(255,255,255,0.2);
      border:2px solid rgba(255,255,255,0.3);
    }
    
    .bubble{
      max-width:70%;
      padding:1.5rem 2rem;
      border-radius:20px;
      line-height:1.8;
      position:relative;
      backdrop-filter:blur(10px);
    }
    .message.bot .bubble{
      background:linear-gradient(135deg,rgba(0,240,255,0.08),rgba(168,85,247,0.08));
      border:2px solid rgba(0,240,255,0.3);
      box-shadow:0 8px 32px rgba(0,240,255,0.2),inset 0 1px 1px rgba(255,255,255,0.1);
    }
    .message.user .bubble{
      background:linear-gradient(135deg,rgba(255,0,110,0.2),rgba(168,85,247,0.15));
      border:2px solid rgba(255,0,110,0.4);
      box-shadow:0 8px 32px rgba(255,0,110,0.3),inset 0 1px 1px rgba(255,255,255,0.1);
    }
    
    /* Welcome Screen */
    .welcome{
      text-align:center;
      padding:4rem 2rem;
      animation:fadeInScale 0.8s ease-out;
    }
    @keyframes fadeInScale{from{opacity:0;transform:scale(0.9);}to{opacity:1;transform:scale(1);}}
    
    .welcome h1{
      font-family:'Orbitron',sans-serif;
      font-size:3.5rem;
      font-weight:900;
      margin-bottom:1rem;
      background:linear-gradient(135deg,var(--neon-blue),var(--neon-pink),var(--neon-green));
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      background-clip:text;
      letter-spacing:3px;
      text-shadow:0 0 60px var(--glow-blue);
      animation:glow 2s ease-in-out infinite;
    }

    @keyframes glow{0%,100%{filter:drop-shadow(0 0 20px var(--glow-blue));}50%{filter:drop-shadow(0 0 40px var(--glow-pink));}}
    
    .welcome p{
      font-size:1.3rem;
      color:rgba(255,255,255,0.7);
      margin-bottom:3rem;
    }
    
    /* Quick Action Cards */
    .quick-cards{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:1.5rem;
      max-width:900px;
      margin:0 auto;
    }
    .quick-card{
      padding:1.5rem;
      background:linear-gradient(135deg,rgba(0,240,255,0.05),rgba(168,85,247,0.05));
      border:2px solid rgba(0,240,255,0.3);
      border-radius:15px;
      cursor:pointer;
      transition:all 0.4s;
      position:relative;
      overflow:hidden;
    }
    .quick-card::before{
      content:'';
      position:absolute;
      inset:0;
      background:linear-gradient(135deg,var(--neon-blue),var(--neon-purple));
      opacity:0;
      transition:opacity 0.4s;
    }
    .quick-card:hover::before{opacity:0.1;}
    .quick-card:hover{
      transform:translateY(-8px) scale(1.02);
      border-color:var(--neon-blue);
      box-shadow:0 20px 60px var(--glow-blue);
    }
    .quick-card-icon{
      font-size:2.5rem;
      margin-bottom:1rem;
      display:block;
      filter:drop-shadow(0 0 10px var(--glow-blue));
    }
    .quick-card-title{
      font-weight:700;
      font-size:1.1rem;
      color:#fff;
      position:relative;
      z-index:1;
    }

    
    /* Input Area - FUTURISTIC */
    .input-section{
      padding:2rem;
      background:linear-gradient(180deg,transparent,rgba(10,1,24,0.8));
      backdrop-filter:blur(20px);
      border-top:2px solid rgba(0,240,255,0.3);
      box-shadow:0 -8px 32px rgba(0,240,255,0.1);
    }
    .input-container{
      max-width:1200px;
      margin:0 auto;
      display:flex;
      gap:1rem;
      align-items:flex-end;
      position:relative;
    }
    .input-wrapper{
      flex:1;
      position:relative;
    }
    .input-wrapper textarea{
      width:100%;
      background:rgba(10,1,24,0.6);
      border:2px solid rgba(0,240,255,0.4);
      border-radius:15px;
      padding:1.2rem 1.5rem;
      color:#fff;
      font-size:1rem;
      font-family:inherit;
      resize:none;
      min-height:60px;
      max-height:150px;
      transition:all 0.3s;
      box-shadow:inset 0 4px 20px rgba(0,0,0,0.3);
    }
    .input-wrapper textarea:focus{
      outline:none;
      border-color:var(--neon-blue);
      box-shadow:0 0 30px var(--glow-blue),inset 0 4px 20px rgba(0,0,0,0.3);
      background:rgba(10,1,24,0.8);
    }
    .input-wrapper textarea::placeholder{
      color:rgba(255,255,255,0.4);
    }

    
    /* Epic Send Button */
    .btn-send{
      background:linear-gradient(135deg,var(--neon-blue),var(--neon-purple));
      color:#fff;
      border:none;
      padding:1.2rem 3rem;
      border-radius:12px;
      font-weight:700;
      font-size:1.1rem;
      cursor:pointer;
      transition:all 0.3s;
      box-shadow:0 8px 32px var(--glow-blue);
      text-transform:uppercase;
      letter-spacing:2px;
      position:relative;
      overflow:hidden;
    }
    .btn-send::before{
      content:'';
      position:absolute;
      inset:0;
      background:linear-gradient(135deg,transparent,rgba(255,255,255,0.3),transparent);
      transform:translateX(-100%);
      transition:transform 0.6s;
    }
    .btn-send:hover::before{transform:translateX(100%);}
    .btn-send:hover:not(:disabled){
      transform:translateY(-4px) scale(1.05);
      box-shadow:0 12px 48px var(--glow-blue);
    }
    .btn-send:disabled{
      opacity:0.4;
      cursor:not-allowed;
      transform:none;
    }
    
    /* Typing Indicator */
    .typing-indicator{
      display:flex;
      gap:0.5rem;
      padding:1rem;
    }
    .typing-dot{
      width:10px;
      height:10px;
      background:var(--neon-blue);
      border-radius:50%;
      animation:typingBounce 1.4s ease-in-out infinite;
      box-shadow:0 0 10px var(--glow-blue);
    }
    .typing-dot:nth-child(2){animation-delay:0.2s;}
    .typing-dot:nth-child(3){animation-delay:0.4s;}
    @keyframes typingBounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-15px);}}

    
    /* Code Blocks */
    code{
      background:rgba(0,240,255,0.15);
      padding:0.3rem 0.6rem;
      border-radius:6px;
      font-family:'Courier New',monospace;
      color:var(--neon-green);
      border:1px solid rgba(0,240,255,0.3);
      font-size:0.9em;
    }
    pre{
      background:rgba(10,1,24,0.8);
      padding:1.5rem;
      border-radius:12px;
      overflow-x:auto;
      margin:1rem 0;
      border:2px solid rgba(0,240,255,0.3);
      box-shadow:inset 0 4px 20px rgba(0,0,0,0.5),0 0 20px var(--glow-blue);
    }
    pre code{
      background:none;
      border:none;
      color:var(--neon-green);
    }
    strong{
      color:var(--neon-pink);
      font-weight:700;
      text-shadow:0 0 10px var(--glow-pink);
    }
    
    /* Responsive */
    @media(max-width:768px){
      .welcome h1{font-size:2.2rem;}
      .quick-cards{grid-template-columns:1fr;}
      .header{padding:1rem 1.5rem;}
      .logo{font-size:1.3rem;}
      .btn-send{padding:1rem 2rem;font-size:1rem;}
      .bubble{max-width:85%;}
    }
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="particles" id="particles"></div>
  
  <div class="container">
    <div class="header">
      <div class="logo">LUMINOM IA</div>
      <div class="header-actions">
        <button class="btn-neon pink" onclick="changeApiKey()">🔑 API KEY</button>
        <button class="btn-neon" onclick="newChat()">NUEVO CHAT</button>
        <a href="index.html" class="btn-neon">INICIO</a>
      </div>
    </div>


    <div class="chat-area">
      <div class="messages" id="messages">
        <div class="welcome" id="welcome">
          <h1>◆ LUMINOM IA ◆</h1>
          <p>Sistema de tutoría avanzado con IA | Todas las materias universitarias</p>
          <div class="quick-cards">
            <div class="quick-card" onclick="sendQuick('Explícame derivadas con ejemplo')">
              <span class="quick-card-icon">📐</span>
              <div class="quick-card-title">MATEMÁTICAS</div>
            </div>
            <div class="quick-card" onclick="sendQuick('¿Cómo funciona un bucle for en Python?')">
              <span class="quick-card-icon">💻</span>
              <div class="quick-card-title">PROGRAMACIÓN</div>
            </div>
            <div class="quick-card" onclick="sendQuick('Explica la Segunda Ley de Newton')">
              <span class="quick-card-icon">⚛️</span>
              <div class="quick-card-title">FÍSICA</div>
            </div>
            <div class="quick-card" onclick="sendQuick('¿Qué es oferta y demanda?')">
              <span class="quick-card-icon">💰</span>
              <div class="quick-card-title">ECONOMÍA</div>
            </div>
          </div>
        </div>
      </div>

      <div class="input-section">
        <div class="input-container">
          <div class="input-wrapper">
            <textarea 
              id="userInput" 
              placeholder="Escribe tu pregunta aquí..."
              onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"
              rows="1"
            ></textarea>
          </div>
          <button class="btn-send" onclick="sendMessage()" id="sendBtn">ENVIAR</button>
        </div>
      </div>
    </div>
  </div>

  <script>

    // Crear partículas flotantes
    function createParticles(){
      const container=document.getElementById('particles');
      for(let i=0;i<30;i++){
        const particle=document.createElement('div');
        particle.className='particle';
        particle.style.left=Math.random()*100+'%';
        particle.style.top=Math.random()*100+'%';
        particle.style.animationDelay=Math.random()*15+'s';
        particle.style.animationDuration=(10+Math.random()*10)+'s';
        if(Math.random()>0.5){
          particle.style.background='var(--neon-pink)';
          particle.style.boxShadow='0 0 10px var(--glow-pink)';
        }
        container.appendChild(particle);
      }
    }
    createParticles();

    // Configuración API
    const API_CONFIG={
      url:'https://api.groq.com/openai/v1/chat/completions',
      key:localStorage.getItem('groq_api_key')||'',
      model:'llama-3.3-70b-versatile'
    };

    let conversationHistory=[];

    // Verificar API Key al cargar
    window.addEventListener('DOMContentLoaded',()=>{
      if(!API_CONFIG.key){
        setTimeout(showApiKeyPrompt,800);
      }
    });

    function showApiKeyPrompt(){
      const modal=`
        <div style="position:fixed;inset:0;background:rgba(0,0,0,0.9);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;z-index:9999;" id="apiModal">
          <div style="background:linear-gradient(135deg,rgba(10,1,24,0.95),rgba(10,1,24,0.85));border:3px solid var(--neon-blue);border-radius:20px;padding:3rem;max-width:600px;box-shadow:0 20px 80px var(--glow-blue);">
            <h2 style="font-family:Orbitron;font-size:2rem;color:var(--neon-blue);margin-bottom:1.5rem;text-align:center;text-shadow:0 0 20px var(--glow-blue);">🔑 CONFIGURACIÓN DE API KEY</h2>
            <p style="color:rgba(255,255,255,0.8);margin-bottom:2rem;line-height:1.8;">Para usar Luminom IA necesitas una <strong style="color:var(--neon-pink);">API Key gratuita</strong> de Groq:</p>
            <ol style="color:rgba(255,255,255,0.7);margin-bottom:2rem;line-height:2;padding-left:1.5rem;">
              <li>Ve a <a href="https://console.groq.com" target="_blank" style="color:var(--neon-blue);">console.groq.com</a></li>
              <li>Crea una cuenta (gratis, sin tarjeta)</li>
              <li>Ve a <strong>API Keys</strong> → <strong>Create API Key</strong></li>
              <li>Copia tu key (empieza con gsk_)</li>
            </ol>
            <input type="text" id="apiKeyInput" placeholder="Pega tu API Key aquí..." style="width:100%;padding:1rem;background:rgba(0,0,0,0.5);border:2px solid var(--neon-blue);border-radius:10px;color:#fff;font-size:1rem;margin-bottom:1.5rem;"/>
            <div style="display:flex;gap:1rem;">
              <button onclick="saveApiKey()" style="flex:1;padding:1rem;background:linear-gradient(135deg,var(--neon-blue),var(--neon-purple));border:none;border-radius:10px;color:#fff;font-weight:700;cursor:pointer;text-transform:uppercase;box-shadow:0 8px 32px var(--glow-blue);">GUARDAR</button>
              <button onclick="document.getElementById('apiModal').remove()" style="padding:1rem 2rem;background:transparent;border:2px solid rgba(255,255,255,0.3);border-radius:10px;color:#fff;cursor:pointer;">CANCELAR</button>
            </div>
          </div>
        </div>
      `;
      document.body.insertAdjacentHTML('beforeend',modal);
      document.getElementById('apiKeyInput').focus();
    }

    function saveApiKey(){
      const key=document.getElementById('apiKeyInput').value.trim();
      if(key&&key.startsWith('gsk_')){
        API_CONFIG.key=key;
        localStorage.setItem('groq_api_key',key);
        document.getElementById('apiModal').remove();
        alert('✅ API Key guardada correctamente. ¡Ya puedes usar el tutor!');
      }else{
        alert('⚠️ La API Key debe empezar con "gsk_". Verifica que la copiaste correctamente.');
      }
    }

    function changeApiKey(){
      if(confirm('¿Quieres cambiar tu API Key de Groq?')){
        localStorage.removeItem('groq_api_key');
        API_CONFIG.key='';
        showApiKeyPrompt();
      }
    }


    function hideWelcome(){
      const welcome=document.getElementById('welcome');
      if(welcome)welcome.style.display='none';
    }

    function addMessage(content,isUser){
      hideWelcome();
      const messagesDiv=document.getElementById('messages');
      const messageDiv=document.createElement('div');
      messageDiv.className=`message ${isUser?'user':'bot'}`;
      
      const avatar=document.createElement('div');
      avatar.className='avatar';
      avatar.textContent=isUser?'👤':'◆';
      
      const bubble=document.createElement('div');
      bubble.className='bubble';
      bubble.innerHTML=formatMessage(content);
      
      messageDiv.appendChild(avatar);
      messageDiv.appendChild(bubble);
      messagesDiv.appendChild(messageDiv);
      messagesDiv.scrollTop=messagesDiv.scrollHeight;
    }

    function formatMessage(text){
      text=text.replace(/```(\w+)?\n?([\s\S]*?)```/g,(_,lang,code)=>
        `<pre><code>${escapeHtml(code.trim())}</code></pre>`
      );
      text=text.replace(/`([^`]+)`/g,'<code>$1</code>');
      text=text.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
      text=text.replace(/\n/g,'<br>');
      return text;
    }

    function escapeHtml(text){
      const div=document.createElement('div');
      div.textContent=text;
      return div.innerHTML;
    }

    function showTyping(){
      hideWelcome();
      const messagesDiv=document.getElementById('messages');
      const typingDiv=document.createElement('div');
      typingDiv.id='typing';
      typingDiv.className='message bot';
      typingDiv.innerHTML=`
        <div class="avatar">◆</div>
        <div class="bubble typing-indicator">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>
      `;
      messagesDiv.appendChild(typingDiv);
      messagesDiv.scrollTop=messagesDiv.scrollHeight;
    }

    function hideTyping(){
      const typing=document.getElementById('typing');
      if(typing)typing.remove();
    }


    async function callGroqAPI(userMessage){
      const systemPrompt=`Eres Luminom IA, un tutor universitario experto para estudiantes colombianos.

Tu misión: Ayudar a entender temas académicos de forma clara, paso a paso y motivadora.

ESTILO DE RESPUESTA:
- Siempre en español claro y natural
- Tono cercano y motivador (como un amigo inteligente)
- Explicaciones paso a paso con ejemplos
- Para matemáticas: muestra los pasos numerados
- Para código: usa bloques de código bien formateados
- Máximo 4 párrafos por respuesta (sé conciso pero completo)
- Usa ejemplos del contexto colombiano cuando sea relevante

MATERIAS QUE DOMINAS:
- Matemáticas (Cálculo, Álgebra, Estadística)
- Programación (Python, JavaScript, Java, C++)
- Física (Mecánica, Termodinámica, Cuántica)
- Química (Orgánica, Inorgánica)
- Economía (Micro, Macro)
- Derecho (Constitucional, Civil, Penal)

NUNCA inventes datos, fórmulas o teoremas que no existen.`;

      try{
        const response=await fetch(API_CONFIG.url,{
          method:'POST',
          headers:{
            'Authorization':`Bearer ${API_CONFIG.key}`,
            'Content-Type':'application/json',
          },
          body:JSON.stringify({
            model:API_CONFIG.model,
            messages:[
              {role:'system',content:systemPrompt},
              ...conversationHistory,
              {role:'user',content:userMessage}
            ],
            temperature:0.7,
            max_tokens:2000,
            top_p:1,
            stream:false
          })
        });

        if(!response.ok){
          const errorData=await response.json().catch(()=>({}));
          
          // Error específico de API key inválida
          if(response.status===401){
            localStorage.removeItem('groq_api_key');
            API_CONFIG.key='';
            throw new Error('API Key inválida o expirada. Por favor configura una nueva.');
          }
          
          throw new Error(errorData.error?.message||`Error ${response.status}: ${response.statusText}`);
        }

        const data=await response.json();
        const aiResponse=data.choices[0]?.message?.content||'No pude generar una respuesta. Intenta de nuevo.';
        
        return aiResponse;
      }catch(error){
        console.error('Error llamando a Groq API:',error);
        
        // Si es error de API key, mostrar modal
        if(error.message.includes('API Key')){
          showApiKeyPrompt();
          return `⚠️ **API Key inválida**\n\nTu API Key no funciona o expiró. Por favor:\n\n1. Verifica que la copiaste completa\n2. Genera una nueva en console.groq.com\n3. Haz clic en "🔑 API KEY" para actualizarla`;
        }
        
        return `⚠️ **Error de conexión**\n\n${error.message}\n\n**Soluciones:**\n- Verifica tu API Key (botón 🔑)\n- Espera 10 segundos e intenta de nuevo\n- Recarga la página si persiste`;
      }
    }


    async function sendMessage(){
      const input=document.getElementById('userInput');
      const message=input.value.trim();
      
      if(!message)return;
      
      if(!API_CONFIG.key){
        showApiKeyPrompt();
        return;
      }
      
      input.value='';
      input.style.height='auto';
      
      const sendBtn=document.getElementById('sendBtn');
      sendBtn.disabled=true;
      sendBtn.textContent='ENVIANDO...';
      
      addMessage(message,true);
      conversationHistory.push({role:'user',content:message});
      
      showTyping();
      
      const aiResponse=await callGroqAPI(message);
      
      hideTyping();
      addMessage(aiResponse,false);
      
      conversationHistory.push({role:'assistant',content:aiResponse});
      
      if(conversationHistory.length>20){
        conversationHistory=conversationHistory.slice(-20);
      }
      
      sendBtn.disabled=false;
      sendBtn.textContent='ENVIAR';
      input.focus();
    }

    function sendQuick(question){
      document.getElementById('userInput').value=question;
      sendMessage();
    }

    function newChat(){
      conversationHistory=[];
      document.getElementById('messages').innerHTML=`
        <div class="welcome" id="welcome">
          <h1>◆ LUMINOM IA ◆</h1>
          <p>Sistema de tutoría avanzado con IA | Todas las materias universitarias</p>
          <div class="quick-cards">
            <div class="quick-card" onclick="sendQuick('Explícame derivadas con ejemplo')">
              <span class="quick-card-icon">📐</span>
              <div class="quick-card-title">MATEMÁTICAS</div>
            </div>
            <div class="quick-card" onclick="sendQuick('¿Cómo funciona un bucle for en Python?')">
              <span class="quick-card-icon">💻</span>
              <div class="quick-card-title">PROGRAMACIÓN</div>
            </div>
            <div class="quick-card" onclick="sendQuick('Explica la Segunda Ley de Newton')">
              <span class="quick-card-icon">⚛️</span>
              <div class="quick-card-title">FÍSICA</div>
            </div>
            <div class="quick-card" onclick="sendQuick('¿Qué es oferta y demanda?')">
              <span class="quick-card-icon">💰</span>
              <div class="quick-card-title">ECONOMÍA</div>
            </div>
          </div>
        </div>
      `;
      document.getElementById('userInput').focus();
    }

    // Auto-resize textarea
    document.getElementById('userInput').addEventListener('input',function(){
      this.style.height='auto';
      this.style.height=Math.min(this.scrollHeight,150)+'px';
    });

    document.getElementById('userInput').focus();
  </script>
