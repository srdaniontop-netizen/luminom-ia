<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Panel Admin - Luminom IA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin /><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy:#0A1628; --gold:#C9A84C; --gold-light:#E8C97A;
      --white:#FFFFFF; --off-white:#F8F6F1;
      --text-primary:#0A1628; --text-secondary:#4A5568;
      --border:rgba(10,22,40,0.1);
      --shadow-sm:0 2px 12px rgba(10,22,40,0.08);
      --radius-lg:22px;
      --font-display:'Playfair Display',Georgia,serif;
      --font-body:'Inter',system-ui,sans-serif;
      --success:#10B981; --warning:#F59E0B; --danger:#EF4444;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:var(--font-body);background:var(--off-white);color:var(--text-primary);min-height:100vh;}
    
    .header{background:var(--navy);padding:1.5rem 2rem;box-shadow:0 2px 12px rgba(0,0,0,0.1);}
    .header-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;}
    .logo{color:var(--white);text-decoration:none;font-family:var(--font-display);font-size:1.3rem;font-weight:700;}
    .logo em{font-style:italic;color:var(--gold);}
    .admin-badge{background:var(--gold);color:var(--navy);padding:0.3rem 0.8rem;border-radius:100px;font-size:0.75rem;font-weight:700;}
    .btn-logout{background:transparent;border:1px solid rgba(255,255,255,0.3);color:var(--white);padding:0.5rem 1.2rem;border-radius:100px;font-size:0.85rem;cursor:pointer;}
    
    .container{max-width:1400px;margin:0 auto;padding:2rem;}
    .page-title{font-family:var(--font-display);font-size:2.5rem;font-weight:700;margin-bottom:0.5rem;}
    .page-subtitle{color:var(--text-secondary);margin-bottom:2rem;}
    
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:1.5rem;margin-bottom:3rem;}
    .stat-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.5rem;}
    .stat-icon{font-size:2rem;margin-bottom:0.5rem;}
    .stat-value{font-family:var(--font-display);font-size:2.5rem;font-weight:700;color:var(--navy);}
    .stat-label{font-size:0.85rem;color:var(--text-secondary);margin-top:0.25rem;}
    
    .section{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);padding:2rem;margin-bottom:2rem;}
    .section-title{font-family:var(--font-display);font-size:1.5rem;font-weight:700;margin-bottom:1.5rem;}
    
    table{width:100%;border-collapse:collapse;}
    thead{background:var(--off-white);}
    th{text-align:left;padding:0.75rem;font-size:0.82rem;font-weight:700;color:var(--text-secondary);text-transform:uppercase;}
    td{padding:0.75rem;border-top:1px solid var(--border);font-size:0.9rem;}
    
    .badge{display:inline-block;padding:0.25rem 0.7rem;border-radius:100px;font-size:0.75rem;font-weight:600;}
    .badge.free{background:#e5e7eb;color:#374151;}
    .badge.premium{background:rgba(201,168,76,0.15);color:var(--gold);}
    .badge.lifetime{background:rgba(16,185,129,0.15);color:var(--success);}
    
    .btn{padding:0.5rem 1rem;border-radius:8px;font-size:0.85rem;font-weight:600;cursor:pointer;border:none;transition:0.2s;}
    .btn-primary{background:var(--gold);color:var(--navy);}
    .btn-primary:hover{background:var(--gold-light);}
    .btn-danger{background:var(--danger);color:white;}
    .btn-danger:hover{opacity:0.9;}
    .btn-small{padding:0.35rem 0.8rem;font-size:0.8rem;}
    
    .loading{text-align:center;padding:3rem;color:var(--text-secondary);}
  </style>
</head>
<body>

  <div class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">Luminom <em>IA</em></a>
      <div style="display:flex;align-items:center;gap:1rem;">
        <span class="admin-badge">ADMIN</span>
        <span style="color:var(--white);font-size:0.9rem;" id="adminName">Cargando...</span>
        <button class="btn-logout" onclick="logout()">Salir</button>
      </div>
    </div>
  </div>

  <div class="container">
    <h1 class="page-title">Panel de Administración</h1>
    <p class="page-subtitle">Gestión de usuarios y suscripciones</p>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon">👥</div>
        <div class="stat-value" id="totalUsers">0</div>
        <div class="stat-label">Usuarios Registrados</div>
      </div>
      
      <div class="stat-card">
        <div class="stat-icon">⭐</div>
        <div class="stat-value" id="premiumUsers">0</div>
        <div class="stat-label">Usuarios Premium</div>
      </div>
      
      <div class="stat-card">
        <div class="stat-icon">👑</div>
        <div class="stat-value" id="lifetimeUsers">0</div>
        <div class="stat-label">Usuarios De por Vida</div>
      </div>
      
      <div class="stat-card">
        <div class="stat-icon">💬</div>
        <div class="stat-value" id="totalChats">0</div>
        <div class="stat-label">Conversaciones Totales</div>
      </div>
    </div>

    <div class="section">
      <h2 class="section-title">📋 Gestión de Usuarios</h2>
      <div id="usersLoading" class="loading">Cargando usuarios...</div>
      <div id="usersTable" style="display:none;">
        <table>
          <thead>
            <tr>
              <th>Nombre</th>
              <th>Email</th>
              <th>Carrera</th>
              <th>Plan</th>
              <th>Fecha Registro</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="usersTableBody">
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <script>
    // Configuración de Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyDzS5dYHznoTUsYYxWxfcA5JAHPMOJkSMA",
      authDomain: "luminom-ia.firebaseapp.com",
      projectId: "luminom-ia",
      storageBucket: "luminom-ia.firebasestorage.app",
      messagingSenderId: "532433042280",
      appId: "1:532433042280:web:ae5f09598957e2bf8a34dd"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // Verificar autenticación admin
    const session = JSON.parse(localStorage.getItem('luminom_session') || 'null');
    
    if (!session || session.email !== 'admin@luminom.com') {
      alert('⚠️ Acceso denegado. Solo el administrador puede acceder a este panel.');
      window.location.href = 'index.html';
    }

    document.getElementById('adminName').textContent = session.name;

    function logout() {
      localStorage.removeItem('luminom_session');
      window.location.href = 'index.html';
    }

    // Cargar datos
    async function loadData() {
      try {
        console.log('📊 Cargando datos del panel de admin...');
        console.log('Usuario admin:', session);
        
        // Obtener todos los usuarios
        console.log('🔵 Cargando usuarios...');
        const usersSnapshot = await db.collection('users').get();
        const users = [];
        usersSnapshot.forEach(doc => {
          users.push({ id: doc.id, ...doc.data() });
        });
        console.log(`✅ Cargados ${users.length} usuarios`);

        // Obtener todos los chats
        console.log('🔵 Cargando chats...');
        const chatsSnapshot = await db.collection('chats').get();
        const totalChats = chatsSnapshot.size;
        console.log(`✅ Cargados ${totalChats} chats`);

        // Calcular estadísticas
        let premiumCount = 0;
        let lifetimeCount = 0;

        users.forEach(user => {
          if (user.subscription && user.subscription.status === 'active') {
            if (user.subscription.plan === 'lifetime') {
              lifetimeCount++;
            } else if (user.subscription.plan === 'premium') {
              premiumCount++;
            }
          }
        });

        console.log('📈 Estadísticas:', {
          total: users.length,
          premium: premiumCount,
          lifetime: lifetimeCount,
          chats: totalChats
        });

        // Actualizar estadísticas
        document.getElementById('totalUsers').textContent = users.length;
        document.getElementById('premiumUsers').textContent = premiumCount;
        document.getElementById('lifetimeUsers').textContent = lifetimeCount;
        document.getElementById('totalChats').textContent = totalChats;

        // Mostrar tabla de usuarios
        displayUsers(users);

      } catch (error) {
        console.error('❌ Error al cargar datos:', error);
        console.error('Código de error:', error.code);
        console.error('Mensaje:', error.message);
        
        let errorMsg = '❌ Error al cargar datos: ' + error.message;
        
        if (error.code === 'permission-denied') {
          errorMsg = `
            ❌ <strong>Error de Permisos</strong><br><br>
            Las reglas de Firestore no permiten al admin leer los datos.<br><br>
            <strong>Solución:</strong><br>
            1. Ir a <a href="https://console.firebase.google.com/project/luminom-ia/firestore/rules" target="_blank">Firebase Console → Firestore → Reglas</a><br>
            2. Copiar las reglas del archivo <code>firestore.rules</code> del proyecto<br>
            3. Publicar las reglas<br>
            4. Esperar 1 minuto y recargar esta página<br><br>
            <strong>Email de admin requerido:</strong> admin@luminom.com
          `;
        }
        
        document.getElementById('usersLoading').innerHTML = errorMsg;
      }
    }

    function displayUsers(users) {
      const tbody = document.getElementById('usersTableBody');
      tbody.innerHTML = '';

      // Ordenar por fecha de registro (más recientes primero)
      users.sort((a, b) => {
        const dateA = new Date(a.createdAt || 0);
        const dateB = new Date(b.createdAt || 0);
        return dateB - dateA;
      });

      users.forEach(user => {
        const row = document.createElement('tr');
        
        // Determinar plan
        let planBadge = '<span class="badge free">📝 Gratis</span>';
        let planType = 'free';
        
        if (user.subscription && user.subscription.status === 'active') {
          if (user.subscription.plan === 'lifetime') {
            planBadge = '<span class="badge lifetime">👑 De por Vida</span>';
            planType = 'lifetime';
          } else if (user.subscription.plan === 'premium') {
            planBadge = '<span class="badge premium">⭐ Premium</span>';
            planType = 'premium';
          }
        }

        // Fecha de registro
        const createdDate = user.createdAt ? new Date(user.createdAt).toLocaleDateString('es-CO') : 'N/A';

        row.innerHTML = `
          <td><strong>${user.name}</strong></td>
          <td>${user.email}</td>
          <td>${user.carrera || 'N/A'}</td>
          <td>${planBadge}</td>
          <td>${createdDate}</td>
          <td>
            ${planType === 'free' ? `
              <button class="btn btn-primary btn-small" onclick="grantPremium('${user.id}', 'premium')">
                Dar Premium
              </button>
              <button class="btn btn-primary btn-small" onclick="grantPremium('${user.id}', 'lifetime')">
                Dar Lifetime
              </button>
            ` : `
              <button class="btn btn-danger btn-small" onclick="revokePremium('${user.id}')">
                Quitar Premium
              </button>
            `}
          </td>
        `;
        
        tbody.appendChild(row);
      });

      document.getElementById('usersLoading').style.display = 'none';
      document.getElementById('usersTable').style.display = 'block';
    }

    // Dar premium gratis a un usuario
    async function grantPremium(userId, plan) {
      const planName = plan === 'lifetime' ? 'De por Vida' : 'Premium';
      
      if (!confirm(`¿Dar plan ${planName} GRATIS a este usuario?`)) {
        return;
      }

      try {
        const subscription = {
          plan: plan,
          userId: userId,
          transactionId: 'admin-granted-' + Date.now(),
          startDate: new Date().toISOString(),
          expiryDate: plan === 'lifetime' ? 'never' : calculateExpiryDate(12), // 12 meses si es premium
          status: 'active',
          paymentMethod: 'admin-gift',
          grantedBy: session.email,
          grantedAt: new Date().toISOString()
        };

        await db.collection('users').doc(userId).update({
          subscription: subscription,
          lastPaymentDate: new Date().toISOString()
        });

        alert(`✅ Plan ${planName} otorgado exitosamente`);
        loadData(); // Recargar datos
      } catch (error) {
        console.error('Error al otorgar premium:', error);
        alert('❌ Error al otorgar premium: ' + error.message);
      }
    }

    // Quitar premium de un usuario
    async function revokePremium(userId) {
      if (!confirm('¿Quitar el plan Premium de este usuario?')) {
        return;
      }

      try {
        await db.collection('users').doc(userId).update({
          subscription: firebase.firestore.FieldValue.delete()
        });

        alert('✅ Premium removido exitosamente');
        loadData(); // Recargar datos
      } catch (error) {
        console.error('Error al remover premium:', error);
        alert('❌ Error al remover premium: ' + error.message);
      }
    }

    function calculateExpiryDate(months) {
      const now = new Date();
      now.setMonth(now.getMonth() + months);
      return now.toISOString();
    }

    // Cargar datos al iniciar
    loadData();
  </script>

</body>
</html>
