<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Chat - Luminom IA</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --primary:#6366F1;
      --secondary:#8B5CF6;
      --accent:#EC4899;
      --dark:#0F172A;
      --darker:#020617;
      --card:#1E293B;
      --text:#F1F5F9;
      --muted:#94A3B8;
      --success:#10B981;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{
      font-family:'Inter',sans-serif;
      background:var(--darker);
      color:var(--text);
      height:100vh;
      display:flex;
      flex-direction:column;
      overflow:hidden;
    }
    
    /* Header */
    .header{
      background:rgba(30,41,59,0.9);
      backdrop-filter:blur(10px);
      padding:1rem 2rem;
      border-bottom:1px solid rgba(99,102,241,0.2);
      display:flex;
      justify-content:space-between;
      align-items:center;
      box-shadow:0 4px 20px rgba(0,0,0,0.2);
    }
    .logo{
      font-size:1.5rem;
      font-weight:800;
      background:linear-gradient(135deg,var(--primary),var(--accent));
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      background-clip:text;
      display:flex;
      align-items:center;
      gap:0.5rem;
    }
    .header-actions{
      display:flex;
      gap:1rem;
      align-items:center;
      flex-wrap:wrap;
    }
    .btn-header{
      padding:0.6rem 1.5rem;
      border-radius:50px;
      border:1px solid rgba(99,102,241,0.3);
      background:transparent;
      color:var(--text);
      font-weight:500;
      cursor:pointer;
      transition:all 0.3s;
      text-decoration:none;
      font-size:0.9rem;
    }
    .btn-header:hover{
      background:rgba(99,102,241,0.1);
      border-color:var(--primary);
    }
    
    /* Chat Container */
    .chat-container{
      flex:1;
      display:flex;
      flex-direction:column;
      max-width:1000px;
      width:100%;
      margin:0 auto;
      padding:1rem;
      overflow:hidden;
    }
    
    /* Messages */
    .messages{
      flex:1;
      overflow-y:auto;
      padding:2rem 1rem;
      display:flex;
      flex-direction:column;
      gap:1.5rem;
    }
    .messages::-webkit-scrollbar{width:8px;}
    .messages::-webkit-scrollbar-track{background:transparent;}
    .messages::-webkit-scrollbar-thumb{background:rgba(99,102,241,0.3);border-radius:10px;}
    .messages::-webkit-scrollbar-thumb:hover{background:rgba(99,102,241,0.5);}
    
    .message{
      display:flex;
      gap:1rem;
      align-items:flex-start;
      animation:slideIn 0.3s ease-out;
    }
    @keyframes slideIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
    
    .message.user{flex-direction:row-reverse;}
    
    .avatar{
      width:40px;
      height:40px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:700;
      font-size:1.2rem;
      flex-shrink:0;
      box-shadow:0 4px 15px rgba(0,0,0,0.3);
    }
    .message.bot .avatar{
      background:linear-gradient(135deg,var(--primary),var(--secondary));
    }
    .message.user .avatar{
      background:linear-gradient(135deg,var(--accent),#F97316);
    }
    
    .bubble{
      max-width:70%;
      padding:1.2rem 1.5rem;
      border-radius:20px;
      line-height:1.7;
      box-shadow:0 4px 15px rgba(0,0,0,0.2);
    }
    .message.bot .bubble{
      background:linear-gradient(135deg,rgba(30,41,59,0.9),rgba(30,41,59,0.7));
      border:1px solid rgba(99,102,241,0.2);
    }
    .message.user .bubble{
      background:linear-gradient(135deg,var(--primary),var(--secondary));
      color:white;
    }
    
    /* Welcome Screen */
    .welcome{
      text-align:center;
      padding:4rem 2rem;
      animation:fadeIn 0.8s ease-out;
    }
    @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
    
    .welcome h2{
      font-size:2.5rem;
      font-weight:800;
      margin-bottom:1rem;
      background:linear-gradient(135deg,#fff,var(--primary),var(--accent));
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      background-clip:text;
    }
    .welcome p{
      color:var(--muted);
      font-size:1.2rem;
      margin-bottom:2rem;
    }
    
    .quick-btns{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
      gap:1rem;
      max-width:700px;
      margin:0 auto;
    }
    .quick-btn{
      padding:1.2rem;
      background:linear-gradient(135deg,rgba(30,41,59,0.8),rgba(30,41,59,0.5));
      backdrop-filter:blur(10px);
      border:1px solid rgba(99,102,241,0.2);
      border-radius:15px;
      color:var(--text);
      cursor:pointer;
      transition:all 0.3s;
      font-size:1rem;
      font-weight:500;
      text-align:left;
    }
    .quick-btn:hover{
      transform:translateY(-5px);
      border-color:var(--primary);
      box-shadow:0 10px 30px rgba(99,102,241,0.3);
    }
    .quick-btn::before{
      content:attr(data-icon);
      font-size:1.5rem;
      display:block;
      margin-bottom:0.5rem;
    }
    
    /* Input Area */
    .input-area{
      padding:1.5rem;
      background:rgba(30,41,59,0.5);
      backdrop-filter:blur(10px);
      border-top:1px solid rgba(99,102,241,0.2);
    }
    .input-wrapper{
      max-width:900px;
      margin:0 auto;
      display:flex;
      gap:1rem;
      align-items:flex-end;
    }
    .input-wrapper textarea{
      flex:1;
      background:rgba(15,23,42,0.8);
      border:2px solid rgba(99,102,241,0.3);
      border-radius:20px;
      padding:1rem 1.5rem;
      color:var(--text);
      font-size:1rem;
      resize:none;
      font-family:inherit;
      min-height:60px;
      max-height:150px;
      transition:all 0.3s;
    }
    .input-wrapper textarea:focus{
      outline:none;
      border-color:var(--primary);
      box-shadow:0 0 20px rgba(99,102,241,0.2);
    }
    .input-wrapper textarea::placeholder{color:var(--muted);}
    
    .btn-send{
      background:linear-gradient(135deg,var(--primary),var(--secondary));
      color:white;
      border:none;
      padding:1rem 2.5rem;
      border-radius:50px;
      font-weight:600;
      cursor:pointer;
      transition:all 0.3s;
      box-shadow:0 10px 30px rgba(99,102,241,0.4);
      font-size:1rem;
    }
    .btn-send:hover:not(:disabled){
      transform:translateY(-3px);
      box-shadow:0 15px 40px rgba(99,102,241,0.6);
    }
    .btn-send:disabled{
      opacity:0.5;
      cursor:not-allowed;
      transform:none;
    }
    
    /* Typing Indicator */
    .typing{
      display:flex;
      gap:0.5rem;
      padding:1rem;
    }
    .typing span{
      width:8px;
      height:8px;
      background:var(--primary);
      border-radius:50%;
      animation:bounce 1.4s ease-in-out infinite;
    }
    .typing span:nth-child(2){animation-delay:0.2s;}
    .typing span:nth-child(3){animation-delay:0.4s;}
    @keyframes bounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-10px);}}
    
    /* Formatting */
    code{
      background:rgba(99,102,241,0.2);
      padding:0.2rem 0.5rem;
      border-radius:6px;
      font-family:'Courier New',monospace;
      font-size:0.9em;
      color:#A5B4FC;
    }
    pre{
      background:rgba(15,23,42,0.8);
      padding:1rem;
      border-radius:10px;
      overflow-x:auto;
      margin:0.8rem 0;
      border:1px solid rgba(99,102,241,0.2);
    }
    pre code{
      background:none;
      padding:0;
      color:#E0E7FF;
    }
    strong{
      color:var(--accent);
      font-weight:600;
    }
    
    /* Responsive */
    @media(max-width:768px){
      .bubble{max-width:85%;}
      .btn-send{padding:1rem 1.5rem;}
      .welcome h2{font-size:1.8rem;}
      .quick-btns{grid-template-columns:1fr;}
      .header-actions{gap:0.5rem;}
      .btn-header{padding:0.5rem 1rem;font-size:0.8rem;}
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">✦ Luminom IA</div>
    <div class="header-actions">
      <button class="btn-header" onclick="changeApiKey()">🔑 API Key</button>
      <button class="btn-header" onclick="newChat()">Nueva Chat</button>
      <a href="index.html" class="btn-header">Inicio</a>
    </div>
  </div>

  <div class="chat-container">
    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <h2>¡Hola! Soy tu tutor con IA 🤖</h2>
        <p>Puedo ayudarte con cualquier materia universitaria. Haz una pregunta o elige un tema:</p>
        <div class="quick-btns">
          <button class="quick-btn" data-icon="📐" onclick="sendQuick('Explícame qué es una derivada con un ejemplo sencillo')">
            Matemáticas
          </button>
          <button class="quick-btn" data-icon="💻" onclick="sendQuick('¿Cómo funciona un bucle for en Python?')">
            Programación
          </button>
          <button class="quick-btn" data-icon="⚛️" onclick="sendQuick('Explica la Segunda Ley de Newton')">
            Física
          </button>
          <button class="quick-btn" data-icon="💰" onclick="sendQuick('¿Qué es la oferta y demanda?')">
            Economía
          </button>
        </div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-wrapper">
        <textarea 
          id="userInput" 
          placeholder="Escribe tu pregunta aquí..." 
          onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault();sendMessage();}"
          rows="1"
        ></textarea>
        <button class="btn-send" onclick="sendMessage()" id="sendBtn">Enviar</button>
      </div>
    </div>
  </div>

  <script>
    // ⚙️ CONFIGURACIÓN DE LA API
    const API_CONFIG = {
      url: 'https://api.groq.com/openai/v1/chat/completions',
      key: localStorage.getItem('groq_api_key') || '',
      model: 'llama-3.3-70b-versatile'
    };

    let conversationHistory = [];

    // Verificar si hay API key guardada
    window.addEventListener('DOMContentLoaded', () => {
      if (!API_CONFIG.key) {
        showApiKeyPrompt();
      }
    });

    function showApiKeyPrompt() {
      const key = prompt('🔑 Por favor ingresa tu API Key de Groq (gratis en https://console.groq.com):\n\nSi ya tienes una, pégala aquí. Si no, crea una cuenta gratis en Groq.');
      if (key && key.trim()) {
        API_CONFIG.key = key.trim();
        localStorage.setItem('groq_api_key', key.trim());
        alert('✅ API Key guardada correctamente. ¡Ya puedes usar el tutor!');
      } else {
        alert('⚠️ Necesitas una API Key para usar el tutor. Recarga la página cuando la tengas.');
      }
    }

    function changeApiKey() {
      if (confirm('¿Quieres cambiar tu API Key de Groq?')) {
        localStorage.removeItem('groq_api_key');
        showApiKeyPrompt();
      }
    }

    function hideWelcome() {
      const welcome = document.getElementById('welcome');
      if (welcome) welcome.style.display = 'none';
    }

    function addMessage(content, isUser) {
      hideWelcome();
      const messagesDiv = document.getElementById('messages');
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${isUser ? 'user' : 'bot'}`;
      
      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.textContent = isUser ? '🎓' : '✦';
      
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.innerHTML = formatMessage(content);
      
      messageDiv.appendChild(avatar);
      messageDiv.appendChild(bubble);
      messagesDiv.appendChild(messageDiv);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function formatMessage(text) {
      // Bloques de código
      text = text.replace(/```(\w+)?\n?([\s\S]*?)```/g, (_, lang, code) => 
        `<pre><code>${escapeHtml(code.trim())}</code></pre>`
      );
      // Código inline
      text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
      // Negritas
      text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      // Saltos de línea
      text = text.replace(/\n/g, '<br>');
      return text;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function showTyping() {
      hideWelcome();
      const messagesDiv = document.getElementById('messages');
      const typingDiv = document.createElement('div');
      typingDiv.id = 'typing';
      typingDiv.className = 'message bot';
      typingDiv.innerHTML = `
        <div class="avatar">✦</div>
        <div class="bubble typing">
          <span></span><span></span><span></span>
        </div>
      `;
      messagesDiv.appendChild(typingDiv);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function hideTyping() {
      const typing = document.getElementById('typing');
      if (typing) typing.remove();
    }

    async function callGroqAPI(userMessage) {
      const systemPrompt = `Eres Luminom IA, un tutor universitario experto para estudiantes colombianos.

Tu misión: Ayudar a entender temas académicos de forma clara, paso a paso y motivadora.

ESTILO DE RESPUESTA:
- Siempre en español claro y natural
- Tono cercano y motivador (como un amigo inteligente)
- Explicaciones paso a paso con ejemplos
- Para matemáticas: muestra los pasos numerados
- Para código: usa bloques de código bien formateados
- Máximo 4 párrafos por respuesta (sé conciso pero completo)
- Usa ejemplos del contexto colombiano cuando sea relevante

MATERIAS QUE DOMINAS:
- Matemáticas (Cálculo, Álgebra, Estadística)
- Programación (Python, JavaScript, Java, C++)
- Física (Mecánica, Termodinámica, Cuántica)
- Química (Orgánica, Inorgánica)
- Economía (Micro, Macro)
- Derecho (Constitucional, Civil, Penal)

NUNCA inventes datos, fórmulas o teoremas que no existen.`;

      try {
        const response = await fetch(API_CONFIG.url, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${API_CONFIG.key}`,
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            model: API_CONFIG.model,
            messages: [
              { role: 'system', content: systemPrompt },
              ...conversationHistory,
              { role: 'user', content: userMessage }
            ],
            temperature: 0.7,
            max_tokens: 2000,
            top_p: 1,
            stream: false
          })
        });

        if (!response.ok) {
          const errorData = await response.json().catch(() => ({}));
          throw new Error(errorData.error?.message || `Error ${response.status}: ${response.statusText}`);
        }

        const data = await response.json();
        const aiResponse = data.choices[0]?.message?.content || 'No pude generar una respuesta. Intenta de nuevo.';
        
        return aiResponse;
      } catch (error) {
        console.error('Error llamando a Groq API:', error);
        return `⚠️ **Hubo un problema con la conexión**

Esto puede pasar por:
- La API está temporalmente saturada
- Tu API Key no es válida o expiró
- Problemas de red

**Soluciones:**
1. Verifica tu API Key haciendo clic en "🔑 API Key"
2. Espera 10 segundos e intenta nuevamente
3. Recarga la página si el problema persiste

Error técnico: ${error.message}`;
      }
    }

    async function sendMessage() {
      const input = document.getElementById('userInput');
      const message = input.value.trim();
      
      if (!message) return;
      
      if (!API_CONFIG.key) {
        alert('⚠️ Por favor configura tu API Key primero. Haz clic en "🔑 API Key"');
        showApiKeyPrompt();
        return;
      }
      
      input.value = '';
      input.style.height = 'auto';
      
      const sendBtn = document.getElementById('sendBtn');
      sendBtn.disabled = true;
      sendBtn.textContent = 'Enviando...';
      
      addMessage(message, true);
      conversationHistory.push({ role: 'user', content: message });
      
      showTyping();
      
      const aiResponse = await callGroqAPI(message);
      
      hideTyping();
      addMessage(aiResponse, false);
      
      conversationHistory.push({ role: 'assistant', content: aiResponse });
      
      // Mantener solo últimos 20 mensajes
      if (conversationHistory.length > 20) {
        conversationHistory = conversationHistory.slice(-20);
      }
      
      sendBtn.disabled = false;
      sendBtn.textContent = 'Enviar';
      input.focus();
    }

    function sendQuick(question) {
      document.getElementById('userInput').value = question;
      sendMessage();
    }

    function newChat() {
      conversationHistory = [];
      document.getElementById('messages').innerHTML = `
        <div class="welcome" id="welcome">
          <h2>¡Hola! Soy tu tutor con IA 🤖</h2>
          <p>Puedo ayudarte con cualquier materia universitaria. Haz una pregunta o elige un tema:</p>
          <div class="quick-btns">
            <button class="quick-btn" data-icon="📐" onclick="sendQuick('Explícame qué es una derivada con un ejemplo sencillo')">
              Matemáticas
            </button>
            <button class="quick-btn" data-icon="💻" onclick="sendQuick('¿Cómo funciona un bucle for en Python?')">
              Programación
            </button>
            <button class="quick-btn" data-icon="⚛️" onclick="sendQuick('Explica la Segunda Ley de Newton')">
              Física
            </button>
            <button class="quick-btn" data-icon="💰" onclick="sendQuick('¿Qué es la oferta y demanda?')">
              Economía
            </button>
          </div>
        </div>
      `;
      document.getElementById('userInput').focus();
    }

    // Auto-resize textarea
    document.getElementById('userInput').addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 150) + 'px';
    });

    // Focus en input al cargar
    document.getElementById('userInput').focus();
  </script>
</body>
</html>
