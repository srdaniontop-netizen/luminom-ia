<!DOCTYPE html>
<html>

<body style="background:#0A1628;color:white;padding:2rem;font-family:Arial;">

<h1>Test Firebase + API</h1>
<div id="status">Cargando...</div>
<br>
<textarea id="input" style="width:100%;padding:10px;"></textarea>
<button id="sendBtn" style="padding:10px 20px;margin-top:10px;">Enviar</button>
<div id="output" style="margin-top:20px;white-space:pre-wrap;"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDzS5dYHznoTUsYYxWxfcA5JAHPMOJkSMA",
  authDomain: "luminom-ia.firebaseapp.com",
  projectId: "luminom-ia",
  storageBucket: "luminom-ia.firebasestorage.app",
  messagingSenderId: "532433042280",
  appId: "1:532433042280:web:ae5f09598957e2bf8a34dd"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

document.getElementById('status').textContent = '✅ Firebase conectado';

// API Config
const parts = ['gsk_','8g9V37JS','uol85XAO','0DtQWGdy','b3FYq2RY','aCRaXqoH','qTZvT6l7','zAKM'];
const API_KEY = parts.join('');

document.getElementById('sendBtn').addEventListener('click', async () => {
  const input = document.getElementById('input').value;
  document.getElementById('output').textContent = 'Enviando...';
  
  try {
    const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${API_KEY}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        messages: [{role:'user', content:input}]
      })
    });
    
    const data = await response.json();
    document.getElementById('output').textContent = '✅ Respuesta:\n\n' + data.choices[0].message.content;
  } catch(e) {
    document.getElementById('output').textContent = '❌ Error: ' + e.message;
  }
});
</script>
</body>
</html>
